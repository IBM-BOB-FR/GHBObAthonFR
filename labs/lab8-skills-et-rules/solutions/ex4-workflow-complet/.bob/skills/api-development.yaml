name: "API Development Standards"
description: "Standards pour le développement d'API REST"
version: "1.0.0"

framework: fastapi
language: python

architecture:
  pattern: "Layered Architecture"
  layers:
    - "Routes: Endpoints API"
    - "Services: Logique métier"
    - "Repositories: Accès aux données"

validation:
  library: "pydantic"
  strict_mode: true
  conventions:
    - "Valider toutes les entrées"
    - "Utiliser des modèles Pydantic"
    - "Définir des contraintes explicites"

error_handling:
  use_http_exceptions: true
  conventions:
    - "Status codes appropriés"
    - "Messages d'erreur clairs"
    - "Logger les erreurs avec contexte"

security:
  authentication: "JWT"
  conventions:
    - "Hasher les mots de passe avec bcrypt"
    - "Valider les tokens"
    - "Rate limiting"

documentation:
  format: "OpenAPI"
  conventions:
    - "Documenter tous les endpoints"
    - "Ajouter des exemples"
    - "Grouper avec tags"

# Made with Bob
