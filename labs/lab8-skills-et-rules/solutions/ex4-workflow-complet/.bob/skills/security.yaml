name: "Security Best Practices"
description: "Bonnes pratiques de sécurité pour les applications"
version: "1.0.0"

authentication:
  method: "JWT"
  token_expiration: "1 hour"
  refresh_token: true
  conventions:
    - "Utiliser bcrypt pour les mots de passe"
    - "Minimum 12 rounds pour bcrypt"
    - "Tokens signés avec secret fort"

authorization:
  model: "Role-based"
  conventions:
    - "Deny-by-default"
    - "Vérifier les permissions sur chaque route protégée"
    - "Ne jamais faire confiance au client"

input_validation:
  conventions:
    - "Valider TOUTES les entrées"
    - "Sanitizer les données utilisateur"
    - "Limiter la taille des uploads"
    - "Vérifier les types MIME"

vulnerabilities:
  protect_against:
    - "SQL Injection: Utiliser des ORM"
    - "XSS: Échapper les sorties"
    - "CSRF: Utiliser des tokens"
    - "Path Traversal: Valider les chemins"

secrets:
  conventions:
    - "JAMAIS de secrets en dur"
    - "Utiliser des variables d'environnement"
    - "Rotation régulière des secrets"
    - "Ne jamais logger les secrets"

rate_limiting:
  enabled: true
  conventions:
    - "Limiter les tentatives de login"
    - "Rate limit par IP"
    - "Throttling sur les endpoints coûteux"

